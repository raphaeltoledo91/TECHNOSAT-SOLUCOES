<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#071013">
    <title>RAFACAR</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #071013;
        color: #eef8f4;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(47, 150, 128, 0.24), transparent 34rem),
          linear-gradient(135deg, #071013, #0c1c1d 52%, #132522);
      }

      main {
        width: min(22rem, calc(100vw - 2rem));
        text-align: center;
      }

      img {
        width: 10rem;
        max-width: 68vw;
        height: auto;
        margin-bottom: 1.25rem;
      }

      p {
        margin: 0;
        color: rgba(238, 248, 244, 0.74);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="https://rafacar-dev2-production.up.railway.app/brand/rafacar-logo-light-remastered.png" alt="RAFACAR">
      <p>Carregando painel RAFACAR...</p>
    </main>
  </body>
</html>
